services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    
  web:
    build: .
    ports:
      - "5001:5001"
    depends_on:
      - redis
    env_file:
      - .env
    environment:
      - FLASK_APP=app.py
      - FLASK_RUN_HOST=0.0.0.0
      - FLASK_DEBUG=0
      - FLASK_ENV=production
    volumes:
      - ./database.db:/app/database.db
      - ./static/uploads:/app/static/uploads
    restart: unless-stopped