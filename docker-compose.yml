services:
  web:
    build: .
    ports:
      - "5001:5001"
    env_file:
      - .env
    environment:
      - FLASK_APP=app.py
      - FLASK_RUN_HOST=0.0.0.0
      - FLASK_DEBUG=0
      - FLASK_ENV=production
    volumes:
      - ./database.db:/app/database.db
      - ./uploads:/app/uploads
    restart: unless-stopped